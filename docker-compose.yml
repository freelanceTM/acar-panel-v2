version: '3.8'

services:
  app:
    build: .
    container_name: acar_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    container_name: acar_worker
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    depends_on:
      - redis
    command: celery -A app.celery_worker worker -B -l info --without-mingle --without-gossip
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: acar_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: acar_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://app:8000
    depends_on:
      - app
    # Для постоянного URL — раскомментируйте и укажите ваш токен:
    # environment:
    #   - TUNNEL_TOKEN=ваш_токен_здесь
    # command: tunnel run

  nginx:
    image: nginx:alpine
    container_name: acar_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - app
