events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server_tokens off;

    limit_req_zone $binary_remote_addr zone=sub_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    # Доверяем заголовки от cloudflared (Docker сеть)
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 10M;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy no-referrer;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma no-cache;
            expires 0;
        }

        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://app:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }

        location /sub/ {
            limit_req zone=sub_limit burst=20 nodelay;
            proxy_pass http://app:8000/sub/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header HWID $http_hwid;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }
    }
}
