<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Açar🔐 Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#030712;--card:#0a0f1e;--card2:#111827;--border:#1e293b;--accent:#6366f1;--accent2:#818cf8;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#f1f5f9;--muted:#64748b;--muted2:#475569}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,textarea,select{font-family:inherit;font-size:14px;background:var(--card2);border:1.5px solid var(--border);color:var(--text);border-radius:14px;padding:13px 16px;width:100%;outline:none;transition:border .2s}
input:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--muted)}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .2s}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .4s ease-out both}

/* Layout */
.app{min-height:100vh;padding-bottom:90px}
.header{position:sticky;top:0;z-index:50;background:rgba(3,7,18,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.04);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn-logout{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid rgba(255,255,255,.06);padding:7px 14px;border-radius:10px;font-size:11px;font-weight:700;letter-spacing:.5px}
.btn-logout:hover{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.2)}
.main{padding:20px;max-width:520px;margin:0 auto}

/* Bottom Nav */
.nav{position:fixed;bottom:16px;left:16px;right:16px;background:rgba(10,15,30,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:20px;display:flex;z-index:50;padding:6px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border-radius:14px;background:none;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .2s}
.nav-btn.active{background:rgba(99,102,241,.12);color:var(--accent2)}
.nav-btn:hover{color:var(--text)}
.nav-icon{font-size:18px;line-height:1}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:14px;transition:border-color .2s}
.card:hover{border-color:rgba(99,102,241,.2)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-name{font-size:18px;font-weight:800;letter-spacing:-.3px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:4px 10px;border-radius:20px;border:1px solid}
.badge-active{color:var(--green);background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.15)}
.badge-expired{color:var(--yellow);background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.15)}
.badge-blocked{color:var(--red);background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.15)}
.badge-proto{color:var(--accent2);background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.1);font-size:8px}

/* Sub/VLESS row */
.sub-row{display:flex;align-items:center;gap:10px;background:rgba(99,102,241,.03);border:1px solid rgba(99,102,241,.08);border-radius:14px;padding:11px 14px;margin-top:8px}
.sub-row.green{background:rgba(16,185,129,.03);border-color:rgba(16,185,129,.08)}
.sub-label{font-size:8px;color:var(--accent2);font-weight:800;letter-spacing:.8px;text-transform:uppercase}
.sub-val{font-size:10px;color:var(--muted2);font-family:'SF Mono',SFMono-Regular,Consolas,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px}
.btn-sm{background:var(--accent);color:white;border:0;padding:8px 12px;border-radius:10px;font-weight:800;font-size:9px;letter-spacing:.3px;white-space:nowrap;flex-shrink:0}
.btn-sm:hover{background:var(--accent2)}
.btn-sm.green{background:#059669}
.btn-sm.green:hover{background:#10b981}

/* Actions */
.actions{display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.04)}
.act-btn{background:none;border:0;font-size:18px;padding:6px;border-radius:8px;transition:background .15s}
.act-btn:hover{background:rgba(255,255,255,.06)}

/* Big add button */
.btn-add{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:0;padding:10px 20px;border-radius:12px;font-weight:700;font-size:12px;letter-spacing:.3px;box-shadow:0 4px 16px rgba(99,102,241,.25)}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.35)}

/* Search */
.search{background:var(--card)!important;border-color:var(--border)!important;padding-left:40px}
.search-wrap{position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;z-index:1}

/* Section title */
.section{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.section h2{font-size:22px;font-weight:800;letter-spacing:-.5px;font-style:italic}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
@media(min-width:640px){.modal-overlay{align-items:center;padding:20px}}
.modal-box{background:var(--card);width:100%;max-height:85vh;overflow-y:auto;border-radius:24px 24px 0 0;padding:28px 22px;border:1px solid var(--border);animation:fadeUp .3s ease-out}
@media(min-width:640px){.modal-box{max-width:400px;border-radius:24px}}
.modal-title{font-size:22px;font-weight:800;margin-bottom:20px;letter-spacing:-.3px}
.modal-form{display:flex;flex-direction:column;gap:10px}
.modal-form label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-left:4px;margin-bottom:-6px}
.modal-form .btn-full{margin-top:8px;padding:15px;border-radius:14px;font-weight:700;font-size:14px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;width:100%}
.modal-form .btn-full:hover{opacity:.9}
.check-row{display:flex;gap:24px;padding:8px 0}
.check-row label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer;text-transform:none;letter-spacing:0;font-weight:500}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--accent);color:white;padding:12px 24px;border-radius:14px;font-weight:700;font-size:13px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:fadeUp .3s ease-out}

/* Loading */
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:60px auto}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:13px;font-weight:600}

/* Checkbox row in modal */
.checks{display:flex;gap:28px;padding:6px 4px}

/* QR modal */
.qr-box{background:white;padding:20px;border-radius:20px;display:flex;justify-content:center;margin:0 auto 20px;width:fit-content}
canvas{display:block}

/* Server row */
.srv-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.srv-row:last-child{border-bottom:none}
.srv-left{flex:1;min-width:0}
.srv-name{font-weight:700;font-size:14px}
.srv-proto{font-size:8px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.5px;margin-top:2px}
.srv-right{display:flex;align-items:center;gap:12px}

/* Toggle */
.toggle{width:38px;height:22px;border-radius:11px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:white;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}

/* Responsive */
@media(max-width:380px){
  .sub-val{max-width:180px}
  .main{padding:14px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const API = location.origin + '/api';
let S = { page:'dashboard', user:null, keys:null, sources:[], servers:[], adminUsers:[] };
let keyQ = '', keyPage = 1;

const $ = s => document.querySelector(s);
const esc = s => String(s||'').replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"');

async function api(m, ep, body) {
  const o = { method:m, headers:{'Content-Type':'application/json'} };
  if(body) o.body = JSON.stringify(body);
  const r = await fetch(API+ep, o);
  if(r.status===401 && ep!=='/auth/login'){ S.user=null; render(); return; }
  const d = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.detail||r.statusText);
  return r.status===204?null:d;
}

const nav = p => { S.page=p; render(); };
const logout = () => api('POST','/auth/logout').finally(()=>{ S.user=null; render(); });

function render(){
  const a = $('#app');
  if(!S.user){ a.innerHTML=loginPage(); return; }
  const pages = {dashboard:dashboardPage,sources:sourcesPage,servers:serversPage,settings:settingsPage,admin:adminPage};
  a.innerHTML = layout(pages[S.page]());
  const inits = {dashboard:initDashboard,sources:initSources,servers:initServers,settings:initSettings,admin:initAdmin};
  if(inits[S.page]) inits[S.page]();
}

function layout(inner){
  const tabs = [
    {id:'dashboard',i:'🔑',l:'Ключи'},
    {id:'sources',i:'🔗',l:'Источники'},
    {id:'servers',i:'🖥',l:'Серверы'},
    {id:'settings',i:'⚙️',l:'Настройки'}
  ];
  if(S.user?.is_admin) tabs.push({id:'admin',i:'👑',l:'Админ'});
  const bnav = tabs.map(n=>`<button onclick="nav('${n.id}')" class="nav-btn ${S.page===n.id?'active':''}"><span class="nav-icon">${n.i}</span>${n.l}</button>`).join('');
  return `<div class="app"><header class="header"><div class="header-title">Açar🔐</div><button onclick="logout()" class="btn-logout">ВЫХОД</button></header><main class="main">${inner}</main><nav class="nav">${bnav}</nav></div>`;
}

/* ─── LOGIN ─── */
function loginPage(){
  setTimeout(()=>{
    $('#lf').onsubmit = async e => {
      e.preventDefault();
      try{
        await api('POST','/auth/login',{username:$('#lu').value,password:$('#lp').value});
        S.user = await api('GET','/dealer/me'); render();
      }catch(er){ $('#lerr').textContent=er.message; $('#lerr').style.display='block'; }
    };
  },0);
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
    <div style="font-size:56px;margin-bottom:16px">🔐</div>
    <h1 style="font-size:30px;font-weight:900;letter-spacing:-1px;margin-bottom:6px;background:linear-gradient(135deg,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Açar Panel</h1>
    <p style="color:var(--muted);font-size:12px;margin-bottom:36px;font-weight:500">Premium VPN Management</p>
    <div class="card" style="width:100%;max-width:340px">
      <div id="lerr" style="display:none;color:var(--red);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);padding:10px 14px;border-radius:12px;margin-bottom:14px;font-size:12px;font-weight:600"></div>
      <form id="lf" class="modal-form">
        <input id="lu" placeholder="Логин" autocomplete="username">
        <input id="lp" type="password" placeholder="Пароль" autocomplete="current-password">
        <button type="submit" class="btn-full">ВОЙТИ</button>
      </form>
    </div>
  </div>`;
}

/* ─── DASHBOARD ─── */
function dashboardPage(){
  return `<div class="section"><h2>Ключи</h2><button onclick="openKeyModal()" class="btn-add">+ Добавить</button></div>
    <div class="search-wrap"><input id="kq" class="search" placeholder="Поиск клиента..." value="${esc(keyQ)}"></div>
    <div id="kList" style="margin-top:16px"><div class="spinner"></div></div>`;
}

async function initDashboard(){
  $('#kq').oninput = e => { keyQ=e.target.value; keyPage=1; loadKeys(); };
  loadKeys();
}

async function loadKeys(){
  try{
    const [r,s,srv] = await Promise.all([api('GET','/dealer/keys?page='+keyPage+'&q='+encodeURIComponent(keyQ)), api('GET','/dealer/sources'), api('GET','/dealer/servers')]);
    S.keys=r; S.sources=s; S.servers=srv; renderKeys(r);
  }catch(e){ toast(e.message); }
}


function expiryLabel(expiresAt){
  if(!expiresAt) return '';
  const diff = new Date(expiresAt) - new Date();
  if(diff <= 0) return '<span style="color:var(--red);font-size:10px;font-weight:700">Истекло</span>';
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  let txt = '';
  if(d > 0) txt = d+'д '+h+'ч';
  else if(h > 0) txt = h+'ч '+m+'м';
  else txt = m+' мин';
  return '<span style="color:var(--yellow);font-size:10px;font-weight:700">⏱ '+txt+'</span>';
}

function keyStatus(k){
  if(k.is_active===false) return '<span class="badge badge-blocked">● Blocked</span>';
  if(k.expires_at && new Date(k.expires_at)<=new Date()) return '<span class="badge badge-blocked">● Expired</span>';
  return '<span class="badge badge-active">● Active</span>';
}

function makeDirectKey(clientName){
  if(!S.servers || !S.servers.length) return null;
  const srv = S.servers.find(s => s.is_active !== false && s.host && s.host !== '127.0.0.1' && s.host !== 'localhost' && s.host !== '0.0.0.0');
  if(!srv) return null;
  const body = srv.raw_link.split('#')[0];
  return body + '#' + encodeURIComponent(clientName);
}

function renderKeys(data){
  const el=$('#kList');
  if(!data.items.length){ el.innerHTML='<div class="empty"><div class="empty-icon">🔑</div><div class="empty-text">Нет ключей</div></div>'; return; }
  el.innerHTML = data.items.map((k,i)=>{
    const sub = location.origin+'/sub/'+k.token;
    const dk = makeDirectKey(k.client_name);
    const vls = (S.sources||[]).filter(s=>s.is_active&&s.vless_template).map(s=>`
      <div class="sub-row">
        <div style="flex:1;min-width:0"><div class="sub-label">${esc(s.name)} VLESS</div><div class="sub-val">${esc(s.vless_template)}</div></div>
        <button onclick="copyVless('${k.id}','${s.id}')" class="btn-sm">КОПИР</button>
      </div>`).join('');
    return `<div class="card fade-up" style="animation-delay:${i*50}ms">
      <div class="card-header"><span class="card-name">${esc(k.client_name)}</span>${keyStatus(k)}</div>
      ${k.expires_at?`<div style="margin-bottom:10px;display:flex;align-items:center;gap:8px">${expiryLabel(k.expires_at)}<span style="color:var(--muted);font-size:9px">до ${new Date(k.expires_at).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span></div>`:''}
      ${vls}
      ${dk?`<div class="sub-row" style="background:rgba(245,158,11,.03);border-color:rgba(245,158,11,.08)">
        <div style="flex:1;min-width:0"><div class="sub-label" style="color:var(--yellow)">Ключ</div><div class="sub-val">${esc(dk)}</div></div>
        <button onclick="copy('${dk}')" class="btn-sm" style="background:var(--yellow)">КОПИР</button>
      </div>`:''}
      <div class="sub-row green">
        <div style="flex:1;min-width:0"><div class="sub-label" style="color:var(--green)">Подписка</div><div class="sub-val">${esc(sub)}</div></div>
        <button onclick="copy('${sub}')" class="btn-sm green">КОПИР</button>
      </div>
      <div class="actions">
        <button onclick="showQR('${sub}')" class="act-btn" title="QR">📱</button>
        <button onclick="editKey('${k.id}')" class="act-btn" title="Редактировать">✏️</button>
        <button onclick="resetKey('${k.id}')" class="act-btn" title="Сбросить привязки" style="color:var(--yellow)">🔄</button>
        <div style="flex:1"></div>
        <button onclick="delKey('${k.id}')" class="act-btn" title="Удалить" style="color:var(--red)">🗑</button>
      </div>
    </div>`;
  }).join('');
  if(data.pages>1){
    el.innerHTML+=`<div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
      ${Array.from({length:data.pages},(_,i)=>`<button onclick="keyPage=${i+1};loadKeys()" class="btn-sm" style="background:${keyPage===i+1?'var(--accent)':'var(--card2)'};border:1px solid var(--border);min-width:36px">${i+1}</button>`).join('')}
    </div>`;
  }
}

function copyVless(kid,sid){
  const k=(S.keys?.items||[]).find(x=>x.id==kid);
  const s=S.sources.find(x=>x.id==sid);
  const t=s?s.vless_template:S.user.vless_template;
  if(!t) return toast('Нет шаблона');
  copy(t.replace(/{USERNAME}/g,k.client_name).split('#')[0]+'#'+encodeURIComponent(k.client_name));
}

function expiryFromNow(h){
  const d=new Date();d.setHours(d.getHours()+h);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
function openKeyModal(k){
  const isE=!!k;
  const curExp = k?.expires_at ? new Date(k.expires_at).toISOString().slice(0,16) : '';
  openModal(`<h3 class="modal-title">${isE?'Редактировать':'Новый'} ключ</h3>
    <form id="kf" class="modal-form">
      <label>Имя клиента</label><input id="kn" value="${esc(k?.client_name)}" placeholder="Имя">
      <label>Лимит устройств (макс. 5)</label><input id="kl" type="number" min="1" max="5" value="${k?.device_limit||3}">
      <label>Срок подписки</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
        <button type="button" onclick="setExp(24)" style="background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">1 день</button>
        <button type="button" onclick="setExp(72)" style="background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">3 дня</button>
        <button type="button" onclick="setExp(168)" style="background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">7 дней</button>
        <button type="button" onclick="setExp(720)" style="background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">30 дней</button>
        <button type="button" onclick="setExp(0)" style="background:var(--card2);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">Бессрочно</button>
      </div>
      <input id="ke" type="datetime-local" value="${curExp}" placeholder="Дата окончания">
      <button type="submit" class="btn-full">${isE?'СОХРАНИТЬ':'СОЗДАТЬ'}</button>
    </form>`);
  window.setExp = function(h){
    const el=$('#ke');
    if(h===0){el.value='';}else{el.value=expiryFromNow(h);}
  };
  setTimeout(()=>{ $('#kf').onsubmit=async e=>{e.preventDefault();
    const expVal=$('#ke').value;
    const b={client_name:$('#kn').value,device_limit:parseInt($('#kl').value)};

}

/* ─── UTILS ─── */
function copy(t){
  if(navigator.clipboard){navigator.clipboard.writeText(t);}else{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);}
  toast('Скопировано ✅');
}

function toast(m){
  const el=document.createElement('div');el.className='toast';el.textContent=m;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
}

function showQR(url){
  openModal(`<h3 class="modal-title">QR Код</h3><div class="qr-box"><canvas id="qrC"></canvas></div><button onclick="copy('${url}')" class="btn-full green" style="background:var(--green)">КОПИРОВАТЬ ССЫЛКУ</button>`);
  setTimeout(()=>{drawQR($('#qrC'),url,240);},50);
}

function openModal(inner){
  const w=document.createElement('div');w.className='modal-overlay open';w.id='mOv';
  w.innerHTML=`<div class="modal-box">${inner}</div>`;
  w.onclick=e=>{if(e.target===w)closeModal();};
  document.body.appendChild(w);
}
function closeModal(){const el=$('#mOv');if(el)el.remove();}

/* ─── QR Generator (inline, no CDN) ─── */
function drawQR(canvas,text,size){
  const ctx=canvas.getContext('2d');
  const data=qrEncode(text);
  const n=data.length;
  const scale=Math.floor(size/(n+8));
  const total=n*scale+8*scale;
  canvas.width=canvas.height=total;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,total,total);
  ctx.fillStyle='#000';
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    if(data[y][x])ctx.fillRect((x+4)*scale,(y+4)*scale,scale,scale);
  }
}

function qrEncode(text){
  const buf=[];
  for(let i=0;i<text.length;i++){let c=text.charCodeAt(i);if(c<128)buf.push(c);else if(c<2048){buf.push(192|(c>>6));buf.push(128|(c&63))}else{buf.push(224|(c>>12));buf.push(128|((c>>6)&63));buf.push(128|(c&63))}}
  const data=new Uint8Array(4096);
  let pos=0;
  data[pos++]=0x40;data[pos++]=buf.length;
  for(let i=0;i<buf.length&&pos<4096;i++)data[pos++]=buf[i];
  const size=21+4*4;
  const m=Array.from({length:size},()=>Array(size).fill(0));
  function setFg(x,y,v){if(x>=0&&x<size&&y>=0&&y<size)m[y][x]=v?1:0;}
  function drawFinder(ox,oy){
    for(let y=-1;y<=7;y++)for(let x=-1;x<=7;x++){
      const v=(x>=0&&x<7&&y>=0&&y<7)&&(x===0||x===6||y===0||y===6||(x>=2&&x<=4&&y>=2&&y<=4));
      setFg(ox+x,oy+y,v?1:0);
    }
  }
  drawFinder(0,0);drawFinder(size-7,0);drawFinder(0,size-7);
  for(let i=8;i<size-8;i++){setFg(i,6,i%2===0);setFg(6,i,i%2===0);}
  let bitPos=0;
  const bits=[];
  for(let i=0;i<pos;i++)for(let b=7;b>=0;b--)bits.push((data[i]>>b)&1);
  let col=size-1,dir=-1,row=size-1;
  while(bitPos<bits.length){
    if(col===6)col--;
    if(m[row][col]===0){
      m[row][col]=bits[bitPos++]||0;
    }
    col+=dir;
    if(col<0||col>=size){dir=-dir;col+=dir;row--;if(row<0)break;}
  }
  return m;
}
