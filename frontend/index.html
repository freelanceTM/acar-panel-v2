<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Açar🔐</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; overscroll-behavior: none; }
  .modal { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.65); align-items:flex-end; justify-content:center; }
  .modal.active { display:flex; }
  @media(min-width:640px){ .modal { align-items:center; } }
  .modal-box { background:#1f2937; color:#f3f4f6; width:100%; max-height:92vh; overflow-y:auto; border-radius:20px 20px 0 0; padding:20px 16px 32px; }
  @media(min-width:640px){ .modal-box { max-width:580px; border-radius:16px; padding:24px; } }
  .modal-box-light { background:#fff !important; color:#111827 !important; border:1px solid #e5e7eb; }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:50; padding-bottom:env(safe-area-inset-bottom); }
  .toast-wrap { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:200; pointer-events:none; white-space:nowrap; }
  @media(min-width:640px){ .toast-wrap { bottom:20px; right:20px; left:auto; transform:none; } }
  .dragging { opacity:.4; }
  input, textarea, select { font-size:16px !important; }
  .page-fade { animation: fadeIn .15s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-thumb { background:#4b5563; border-radius:4px; }
</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>
<script>
const API = location.origin + '/api';
let state = { page: 'dashboard', user: null, keys: [], sources: [], servers: [], dark: true };

const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

/* ---- API ---- */
async function api(method, endpoint, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + endpoint, opts);
  if (res.status === 401) { state.user = null; render(); return; }
  if (!res.ok) { const err = await res.json().catch(()=>null); throw new Error(err?.detail || res.statusText); }
  return res.status === 204 ? null : res.json();
}

/* ---- Theme ---- */
function toggleTheme() {
  state.dark = !state.dark;
  document.documentElement.classList.toggle('dark', state.dark);
  document.body.className = state.dark ? 'bg-gray-950 text-gray-100 min-h-screen' : 'bg-gray-50 text-gray-900 min-h-screen';
  localStorage.setItem('rp_theme', state.dark ? 'dark' : 'light');
  render();
}
function loadTheme() {
  if (localStorage.getItem('rp_theme') === 'light') {
    state.dark = false;
    document.documentElement.classList.remove('dark');
    document.body.className = 'bg-gray-50 text-gray-900 min-h-screen';
  }
}

/* ---- Render ---- */
function navigate(page) { state.page = page; render(); }

function render() {
  const app = $('#app');
  if (!state.user) { app.innerHTML = loginPage(); bindLogin(); return; }
  const pages = { dashboard: dashboardPage, sources: sourcesPage, servers: serversPage, settings: settingsPage, admin: adminPage };
  const fn = pages[state.page];
  if (!fn || (state.page === 'admin' && !state.user.is_admin)) { state.page = 'dashboard'; render(); return; }
  app.innerHTML = layout(fn());
  const inits = { dashboard: initDashboard, sources: initSources, servers: initServers, settings: initSettings, admin: initAdmin };
  if (inits[state.page]) inits[state.page]();
}

/* ---- Modal helpers ---- */
function openModal(id, html) {
  const lightCls = state.dark ? '' : ' modal-box-light';
  const wrap = document.createElement('div');
  wrap.id = id;
  wrap.className = 'modal active';
  wrap.innerHTML = '<div class="modal-box' + lightCls + '">' + html + '</div>';
  wrap.addEventListener('click', e => { if (e.target === wrap) closeModal(id); });
  const holder = document.getElementById('modal') || document.body;
  holder.appendChild(wrap);
}
function closeModal(id) { const el = document.getElementById(id); if (el) el.remove(); }

function closeBtnHtml(id) {
  const cls = state.dark ? 'bg-gray-700 text-gray-300' : 'bg-gray-100 text-gray-600';
  return '<button onclick="closeModal(\'' + id + '\')" class="w-8 h-8 flex items-center justify-center rounded-full ' + cls + '">✕</button>';
}

/* ---- Login ---- */
function loginPage() {
  const d = state.dark;
  const cardCls = d ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-200';
  const inpCls = d ? 'bg-gray-800 border-gray-700' : 'bg-gray-100 border-gray-200';
  const subCls = d ? 'text-gray-400' : 'text-gray-500';
  return '<div class="min-h-screen flex flex-col items-center justify-center p-5 ' + (d?'bg-gray-950':'bg-gray-50') + '">'
    + '<div class="w-full max-w-sm">'
    + '<div class="text-center mb-8">'
    + '<div class="w-16 h-16 rounded-2xl bg-indigo-600 flex items-center justify-center text-2xl mx-auto mb-3">🔐</div>'
    + '<h1 class="text-2xl font-bold">Açar</h1>'
    + '<p class="text-sm ' + subCls + ' mt-1">VPN управление</p>'
    + '</div>'
    + '<div class="' + cardCls + ' border rounded-2xl p-5 shadow-xl">'
    + '<div id="loginError" class="hidden mb-3 text-sm text-red-400 bg-red-950/40 border border-red-900 rounded-xl px-3 py-2.5"></div>'
    + '<form id="loginForm" class="space-y-3">'
    + '<input name="username" placeholder="Логин" autocomplete="off" class="w-full ' + inpCls + ' border rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition">'
    + '<input name="password" type="password" placeholder="Пароль" autocomplete="current-password" class="w-full ' + inpCls + ' border rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition">'
    + '<button class="w-full bg-indigo-600 active:bg-indigo-700 text-white font-semibold rounded-xl px-4 py-3 mt-1">Войти</button>'
    + '</form>'
    + '<p class="text-center text-sm ' + subCls + ' mt-4">Нет аккаунта? <a href="#" onclick="showRegister();return false;" class="text-indigo-400 font-medium">Регистрация</a></p>'
    + '</div></div></div>';
}

function bindLogin() {
  $('#loginForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await api('POST', '/auth/login', { username: fd.get('username'), password: fd.get('password') });
      const user = await api('GET', '/dealer/me');
      state.user = user; navigate('dashboard');
    } catch(err) {
      const el = $('#loginError');
      el.textContent = err.message; el.classList.remove('hidden');
    }
  });
}

function showRegister() {
  const d = state.dark;
  const inpCls = 'w-full ' + (d ? 'bg-gray-800 border-gray-700' : 'bg-gray-100 border-gray-200') + ' border rounded-xl px-4 py-3 outline-none focus:border-indigo-500';
  openModal('regModal',
    '<div class="flex items-center justify-between mb-5"><h2 class="text-xl font-bold">Регистрация</h2>' + closeBtnHtml('regModal') + '</div>'
    + '<div id="regError" class="hidden mb-3 text-sm text-red-400 bg-red-950/40 border border-red-900 rounded-xl px-3 py-2"></div>'
    + '<form id="regForm" class="space-y-3">'
    + '<input name="username" placeholder="Логин" class="' + inpCls + '">'
    + '<input name="password" type="password" placeholder="Пароль (мин. 6)" class="' + inpCls + '">'
    + '<button class="w-full mt-1 bg-indigo-600 active:bg-indigo-700 text-white font-semibold rounded-xl py-3">Создать аккаунт</button>'
    + '</form>'
  );
  $('#regForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    try {
      const fd = new FormData(e.target);
      await api('POST', '/auth/register', { username: fd.get('username'), password: fd.get('password') });
      closeModal('regModal'); toast('Аккаунт создан. Войдите.');
    } catch(err) { const el = $('#regError'); el.textContent = err.message; el.classList.remove('hidden'); }
  });
}

/* ---- Layout ---- */
function layout(inner) {
  const d = state.dark;
  const bg = d ? 'bg-gray-950 text-gray-100' : 'bg-gray-50 text-gray-900';
  const hdr = d ? 'border-gray-800 bg-gray-900/80' : 'border-gray-200 bg-white/90';
  const mhdr = d ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-200';
  const bnav = d ? 'bg-gray-900/95 border-gray-800' : 'bg-white/95 border-gray-200';

  const navItems = [
    { id:'dashboard', icon:'🗝️', label:'Ключи' },
    { id:'sources',   icon:'🔗', label:'Источники' },
    { id:'servers',   icon:'🖥️', label:'Серверы' },
    { id:'settings',  icon:'⚙️', label:'Настройки' },
  ];
  if (state.user && state.user.is_admin) navItems.push({ id:'admin', icon:'👑', label:'Админ' });

  const bottomNav = navItems.map(function(n) {
    const active = state.page === n.id;
    const cls = active ? 'text-indigo-400' : (d ? 'text-gray-500' : 'text-gray-400');
    return '<button onclick="navigate(\'' + n.id + '\')" class="flex flex-col items-center justify-center flex-1 py-2 transition ' + cls + '">'
      + '<span class="text-xl leading-none">' + n.icon + '</span>'
      + '<span class="text-[10px] mt-0.5 font-medium">' + n.label + '</span>'
      + '</button>';
  }).join('');

  const desktopNav = navItems.map(function(n) {
    const active = state.page === n.id;
    const cls = active
      ? (d ? 'bg-indigo-600/20 text-indigo-400' : 'bg-indigo-50 text-indigo-600')
      : (d ? 'text-gray-400 hover:text-white hover:bg-gray-800' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-100');
    return '<a href="#" onclick="navigate(\'' + n.id + '\');return false;" class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition ' + cls + '">'
      + '<span>' + n.icon + '</span>' + n.label + '</a>';
  }).join('');

  const themeBtn = '<button onclick="toggleTheme()" class="' + (d?'text-gray-400 hover:text-white':'text-gray-500 hover:text-gray-900') + ' p-2 rounded-lg transition" title="Тема">◐</button>';
  const logoutBtn = '<button onclick="logout()" class="text-sm ' + (d?'text-gray-400 hover:text-white':'text-gray-500 hover:text-gray-900') + ' px-3 py-2 rounded-lg transition">Выйти</button>';

  return '<div class="min-h-screen ' + bg + ' pb-20 sm:pb-0">'
    // Desktop header
    + '<header class="hidden sm:block border-b ' + hdr + ' backdrop-blur sticky top-0 z-40">'
    + '<div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">'
    + '<div class="flex items-center gap-2"><div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-sm">🔐</div><span class="font-bold">Açar</span></div>'
    + '<nav class="flex items-center gap-1">' + desktopNav + '</nav>'
    + '<div class="flex items-center gap-1">' + themeBtn + logoutBtn + '</div>'
    + '</div></header>'
    // Mobile top bar
    + '<div class="sm:hidden ' + mhdr + ' border-b px-4 h-12 flex items-center justify-between sticky top-0 z-40">'
    + '<div class="flex items-center gap-2"><div class="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center text-xs">🔐</div><span class="font-bold text-sm">Açar</span></div>'
    + '<div class="flex items-center gap-1">' + themeBtn + '<button onclick="logout()" class="text-xs ' + (d?'text-gray-400':'text-gray-500') + ' px-2 py-1.5 rounded-lg">Выйти</button></div>'
    + '</div>'
    // Content
    + '<main class="max-w-6xl mx-auto px-3 sm:px-4 py-4 sm:py-6 page-fade">' + inner + '</main>'
    // Bottom nav mobile
    + '<nav class="bottom-nav sm:hidden ' + bnav + ' border-t backdrop-blur flex">' + bottomNav + '</nav>'
    + '</div>'
    + '<div id="modal"></div>';
}

/* ============ DASHBOARD ============ */
function dashboardPage() {
  const d = state.dark;
  const inpCls = d ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-200';
  return '<div class="flex items-center justify-between mb-4">'
    + '<h2 class="text-base sm:text-lg font-semibold">Ключи клиентов</h2>'
    + '<button onclick="openKeyModal()" class="bg-indigo-600 active:bg-indigo-700 text-white px-3 py-2 rounded-xl text-sm font-medium">+ Ключ</button>'
    + '</div>'
    + '<div class="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3 mb-4" id="statsCards"></div>'
    + '<div class="mb-3"><input id="searchKeys" placeholder="🔍 Поиск по имени..." class="w-full ' + inpCls + ' border rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-500 transition"></div>'
    + '<div id="keysList"></div>'
    + '<div id="keysPager" class="mt-3 flex items-center justify-between text-xs ' + (d?'text-gray-400':'text-gray-500') + '"></div>';
}

async function initDashboard() {
  $('#searchKeys')?.addEventListener('input', () => { keyQ = $('#searchKeys').value; loadKeys(1); });
  await loadKeys(1);
  try {
    const stats = await api('GET', '/dealer/stats');
    const d = state.dark;
    const card = (label, val, color) => '<div class="' + (d?'bg-gray-900 border-gray-800':'bg-white border-gray-200') + ' border rounded-xl p-3"><div class="text-xs ' + (d?'text-gray-500':'text-gray-400') + ' mb-1">' + label + '</div><div class="text-2xl font-bold ' + color + '">' + val + '</div></div>';
    $('#statsCards').innerHTML = card('Ключей', stats.total_keys, 'text-white') + card('Активных', stats.active_keys, 'text-emerald-400') + card('Источников', stats.total_sources, 'text-blue-400') + card('Серверов', stats.total_servers, 'text-purple-400');
  } catch(e) {}
}

let keyPage = 1, keyQ = '';
async function loadKeys(page) {
  keyPage = page;
  try {
    const res = await api('GET', '/dealer/keys?page=' + page + '&limit=15&q=' + encodeURIComponent(keyQ));
    state.keys = res;
    renderKeys(res);
  } catch(err) { toast(err.message); }
}

function statusBadge(k) {
  if (!k.is_active) return '<span class="text-[10px] font-medium bg-red-950/50 text-red-400 px-2 py-0.5 rounded-full">Откл</span>';
  if (k.expires_at && new Date(k.expires_at) < new Date()) return '<span class="text-[10px] font-medium bg-orange-950/50 text-orange-400 px-2 py-0.5 rounded-full">Просрочен</span>';
  return '<span class="text-[10px] font-medium bg-emerald-950/50 text-emerald-400 px-2 py-0.5 rounded-full">Активен</span>';
}

function renderKeys(data) {
  const d = state.dark;
  const el = $('#keysList');
  const pager = $('#keysPager');
  if (!data.items.length) {
    el.innerHTML = '<div class="text-center py-12 ' + (d?'text-gray-500':'text-gray-400') + '"><div class="text-4xl mb-2">🗝️</div><div class="text-sm">Нет ключей. Добавьте первый!</div></div>';
    if (pager) pager.innerHTML = '';
    return;
  }
  const cardBg = d ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-200';
  const monoBg = d ? 'bg-gray-800' : 'bg-gray-100';
  const divider = d ? 'border-gray-800' : 'border-gray-100';
  const btnGray = d ? 'bg-gray-800 active:bg-gray-700' : 'bg-gray-100 active:bg-gray-200';
  const btnEdit = d ? 'bg-indigo-600/20 text-indigo-400' : 'bg-indigo-50 text-indigo-600';
  const btnDel  = d ? 'bg-red-950/40 text-red-400' : 'bg-red-50 text-red-500';
  const sub     = d ? 'text-gray-500' : 'text-gray-400';
  const sub2    = d ? 'text-gray-300' : 'text-gray-700';

  el.innerHTML = data.items.map(function(k) {
    const url = location.origin + '/sub/' + k.token;
    const bypassUrl = wrapUrl(url);
    const exp = k.expires_at ? ' · Истекает: <span class="font-medium">' + new Date(k.expires_at).toLocaleDateString('ru') + '</span>' : '';
    return '<div class="' + cardBg + ' border rounded-xl p-4 mb-2.5">'
      + '<div class="flex items-start justify-between gap-2">'
      + '<div class="flex-1 min-w-0">'
      + '<div class="flex items-center gap-2 mb-2"><span class="font-semibold text-sm truncate">' + esc(k.client_name) + '</span>' + statusBadge(k) + '</div>'
      + '<div class="' + monoBg + ' rounded-lg px-3 py-2 flex items-center justify-between gap-2">'
      + '<span class="font-mono text-xs ' + sub + ' truncate">' + k.token + '</span>'
      + '<div class="flex flex-col gap-1 flex-shrink-0">' + '<button onclick="copyText(\'' + url + '\')" class="text-indigo-400 active:text-indigo-300 text-xs font-medium block">Копир</button>' + '<button onclick="copyText(\'' + bypassUrl + '\')" class="text-emerald-400 active:text-emerald-300 text-xs font-medium block">Обход</button>' + '</div>'
      + '</div>'
      + '<div class="text-xs ' + sub + ' mt-2">Лимит: <span class="font-medium ' + sub2 + '">' + k.device_limit + '</span>' + exp + '</div>'
      + '</div></div>'
      + '<div class="flex items-center gap-2 mt-3 pt-3 border-t ' + divider + ' flex-wrap">'
      + '<button onclick="showQr(\'' + url + '\')" class="' + btnGray + ' text-xs px-3 py-1.5 rounded-lg font-medium">📱 QR</button>'
      + '<button onclick="showDevices(' + k.id + ')" class="' + btnGray + ' text-xs px-3 py-1.5 rounded-lg font-medium">📟 Устройства</button>'
      + '<button onclick="editKey(' + k.id + ')" class="' + btnEdit + ' text-xs px-3 py-1.5 rounded-lg font-medium">✏️ Изменить</button>'
      + '<button onclick="resetKey(' + k.id + ')" class="' + btnGray + ' text-xs px-3 py-1.5 rounded-lg font-medium">🔄 Сброс</button>'
      + '<button onclick="deleteKey(' + k.id + ')" class="' + btnDel + ' text-xs px-3 py-1.5 rounded-lg font-medium ml-auto">🗑️</button>'
      + '</div></div>';
  }).join('');

  if (pager) {
    if (data.pages > 1) {
      const prev = data.page > 1 ? '<button onclick="loadKeys(' + (data.page-1) + ')" class="' + (d?'bg-gray-800':'bg-gray-200') + ' px-3 py-1.5 rounded-lg">←</button>' : '';
      const next = data.page < data.pages ? '<button onclick="loadKeys(' + (data.page+1) + ')" class="' + (d?'bg-gray-800':'bg-gray-200') + ' px-3 py-1.5 rounded-lg">→</button>' : '';
      pager.innerHTML = '<span>Стр. ' + data.page + ' из ' + data.pages + ' · ' + data.total + '</span><div class="flex gap-1">' + prev + next + '</div>';
    } else {
      pager.innerHTML = '<span>' + data.total + ' ключей</span>';
    }
  }
}

function openKeyModal(key) {
  const isEdit = !!key;
  const d = state.dark;
  const inpCls = 'w-full ' + (d ? 'bg-gray-800 border-gray-700' : 'bg-gray-100 border-gray-200') + ' border rounded-xl px-4 py-3 outline-none focus:border-indigo-500';
  const expVal = key && key.expires_at ? new Date(key.expires_at).toISOString().slice(0,10) : '';
  const cancelCls = d ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200';
  openModal('keyModal',
    '<div class="flex items-center justify-between mb-5"><h2 class="text-xl font-bold">' + (isEdit?'Редактировать':'Новый') + ' ключ</h2>' + closeBtnHtml('keyModal') + '</div>'
    + '<form id="keyForm" class="space-y-3">'
    + '<div><label class="text-xs ' + (d?'text-gray-400':'text-gray-500') + ' mb-1 block">Имя клиента</label><input name="client_name" placeholder="Иван Иванов" value="' + esc(key?key.client_name:'') + '" class="' + inpCls + '"></div>'
    + '<div><label class="text-xs ' + (d?'text-gray-400':'text-gray-500') + ' mb-1 block">Лимит устройств</label><input name="device_limit" type="number" min="1" max="10" value="' + (key?key.device_limit:3) + '" class="' + inpCls + '"></div>'
    + '<div><label class="text-xs ' + (d?'text-gray-400':'text-gray-500') + ' mb-1 block">Срок действия (необязательно)</label><input name="expires_at" type="date" value="' + expVal + '" class="' + inpCls + '"></div>'
    + '<label class="flex items-center gap-3 py-1 cursor-pointer"><input type="checkbox" name="is_active" ' + (key&&key.is_active===false?'':'checked') + ' class="w-5 h-5 rounded accent-indigo-600"><span class="text-sm">Активен</span></label>'
    + '<div class="flex gap-2 pt-2"><button type="button" onclick="closeModal(\'keyModal\')" class="' + cancelCls + ' flex-1 py-3 rounded-xl font-medium text-sm">Отмена</button><button class="bg-indigo-600 active:bg-indigo-700 text-white flex-1 py-3 rounded-xl font-semibold text-sm">' + (isEdit?'Сохранить':'Создать') + '</button></div>'
    + '</form>'
  );
  $('#keyForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = { client_name: fd.get('client_name'), device_limit: parseInt(fd.get('device_limit')), is_active: !!fd.get('is_active') };
    const exp = fd.get('expires_at');
    if (exp) body.expires_at = new Date(exp + 'T23:59:59').toISOString();
    try {
      if (isEdit) await api('PATCH', '/dealer/keys/' + key.id, body);
      else await api('POST', '/dealer/keys', body);
      closeModal('keyModal'); toast(isEdit ? 'Ключ обновлён' : 'Ключ создан'); loadKeys(keyPage);
    } catch(err) { toast(err.message); }
  });
}

async function editKey(id) {
  const k = state.keys && state.keys.items && state.keys.items.find(x => x.id === id);
  if (k) { openKeyModal(k); return; }
  try { const k2 = await api('GET', '/dealer/keys/' + id); openKeyModal(k2); } catch(e) {}
}
async function deleteKey(id) {
  if (!confirm('Удалить ключ?')) return;
  try { await api('DELETE', '/dealer/keys/' + id); toast('Удалено'); loadKeys(keyPage); } catch(e) { toast(e.message); }
}
async function resetKey(id) {
  if (!confirm('Сбросить устройства?')) return;

/* ============ SOURCES ============ */
function sourcesPage() {
  const d = state.dark;
  return '<div class="flex items-center justify-between mb-4"><h2 class="text-base sm:text-lg font-semibold">Источники</h2><button onclick="openSourceModal()" class="bg-indigo-600 active:bg-indigo-700 text-white px-3 py-2 rounded-xl text-sm font-medium">+ Добавить</button></div>'
    + '<div id="sourcesList"><div class="text-center py-8 ' + (d?'text-gray-500':'text-gray-400') + '">Загрузка...</div></div>';
}

async function initSources() { await loadSources(); }

async function loadSources() {
  const d = state.dark;
  try {
    const sources = await api('GET', '/dealer/sources');
    state.sources = sources;
    const el = $('#sourcesList');
    if (!sources.length) {
      el.innerHTML = '<div class="text-center py-12 ' + (d?'text-gray-500':'text-gray-400') + '"><div class="text-4xl mb-2">🔗</div><div class="text-sm">Нет источников</div></div>';
      return;
    }
    const cardBg  = d ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-200';
    const divider = d ? 'border-gray-800' : 'border-gray-100';
    const btnGray = d ? 'bg-gray-800' : 'bg-gray-100';
    const btnEdit = d ? 'bg-indigo-600/20 text-indigo-400' : 'bg-indigo-50 text-indigo-600';
    const btnDel  = d ? 'bg-red-950/40 text-red-400' : 'bg-red-50 text-red-500';
    el.innerHTML = sources.map(function(s) {
      const activeCls = s.is_active ? (d?'bg-emerald-950/50 text-emerald-400':'bg-emerald-100 text-emerald-700') : (d?'bg-red-950/50 text-red-400':'bg-red-100 text-red-600');
      const lastFetch = s.last_fetched_at ? '<div class="text-xs ' + (d?'text-gray-600':'text-gray-400') + ' mt-1">Обновлён: ' + new Date(s.last_fetched_at).toLocaleString('ru') + '</div>' : '';
      const cnt = s.servers_count !== undefined ? '<div class="text-xs ' + (d?'text-gray-500':'text-gray-400') + ' mt-0.5">Серверов: ' + s.servers_count + '</div>' : '';
      return '<div class="' + cardBg + ' border rounded-xl p-4 mb-2.5">'
        + '<div class="flex items-start justify-between gap-2">'
        + '<div class="flex-1 min-w-0">'
        + '<div class="flex items-center gap-2 mb-2"><span class="font-semibold text-sm">' + esc(s.name) + '</span><span class="text-[10px] font-medium ' + activeCls + ' px-2 py-0.5 rounded-full">' + (s.is_active?'Активен':'Откл') + '</span></div>'
        + '<div class="text-xs ' + (d?'text-gray-400':'text-gray-500') + ' font-mono truncate">' + esc(s.url) + '</div>'
        + lastFetch + cnt
        + '</div></div>'
        + '<div class="flex items-center gap-2 mt-3 pt-3 border-t ' + divider + '">'
        + '<button onclick="refreshSource(' + s.id + ')" class="' + btnGray + ' text-xs px-3 py-1.5 rounded-lg font-medium">🔄 Обновить</button>'
        + '<button onclick="editSource(' + s.id + ')" class="' + btnEdit + ' text-xs px-3 py-1.5 rounded-lg font-medium">✏️ Изменить</button>'
        + '<button onclick="deleteSource(' + s.id + ')" class="' + btnDel + ' text-xs px-3 py-1.5 rounded-lg font-medium ml-auto">🗑️</button>'
        + '</div></div>';
    }).join('');
  } catch(e) { toast(e.message); }
}

function openSourceModal(src) {
  const isEdit = !!src;
  const d = state.dark;
  const inpCls = 'w-full ' + (d ? 'bg-gray-800 border-gray-700' : 'bg-gray-100 border-gray-200') + ' border rounded-xl px-4 py-3 outline-none focus:border-indigo-500';
  const cancelCls = d ? 'bg-gray-700' : 'bg-gray-100';
  openModal('srcModal',
    '<div class="flex items-center justify-between mb-5"><h2 class="text-xl font-bold">' + (isEdit?'Изменить':'Новый') + ' источник</h2>' + closeBtnHtml('srcModal') + '</div>'
    + '<form id="srcForm" class="space-y-3">'
    + '<div><label class="text-xs ' + (d?'text-gray-400':'text-gray-500') + ' mb-1 block">Название</label><input name="name" value="' + esc(src?src.name:'') + '" class="' + inpCls + '" placeholder="Мой источник"></div>'
    + '<div><label class="text-xs ' + (d?'text-gray-400':'text-gray-500') + ' mb-1 block">URL подписки</label><input name="url" value="' + esc(src?src.url:'') + '" class="' + inpCls + '" placeholder="https://..."></div>'
    + '<label class="flex items-center gap-3 py-1 cursor-pointer"><input type="checkbox" name="is_active" ' + (src&&src.is_active===false?'':'checked') + ' class="w-5 h-5 rounded accent-indigo-600"><span class="text-sm">Активен</span></label>'
    + '<div class="flex gap-2 pt-2"><button type="button" onclick="closeModal(\'srcModal\')" class="' + cancelCls + ' flex-1 py-3 rounded-xl font-medium text-sm">Отмена</button><button class="bg-indigo-600 text-white flex-1 py-3 rounded-xl font-semibold text-sm">' + (isEdit?'Сохранить':'Создать') + '</button></div>'
    + '</form>'
  );
  $('#srcForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = { name: fd.get('name'), url: fd.get('url'), is_active: !!fd.get('is_active') };
    try {
      if (isEdit) await api('PATCH', '/dealer/sources/' + src.id, body);
      else await api('POST', '/dealer/sources', body);
      closeModal('srcModal'); toast(isEdit ? 'Обновлено' : 'Источник добавлен'); loadSources();
    } catch(err) { toast(err.message); }
  });
}

async function editSource(id) { const s = state.sources.find(x => x.id === id); if (s) openSourceModal(s); }
async function deleteSource(id) {
  if (!confirm('Удалить источник?')) return;
  try { await api('DELETE', '/dealer/sources/' + id); toast('Удалено'); loadSources(); } catch(e) { toast(e.message); }
}
async function refreshSource(id) {
  try { await api('POST', '/dealer/sources/' + id + '/refresh'); toast('Обновление запущено...'); setTimeout(loadSources, 2000); } catch(e) { toast(e.message); }
}

async function initServers() {

function renderServers(servers) {
  const d = state.dark;
  const el = $('#srvList');
  if (!servers.length) {
    el.innerHTML = '<div class="text-center py-12 ' + (d?'text-gray-500':'text-gray-400') + '"><div class="text-4xl mb-2">🖥️</div><div class="text-sm">Нет серверов. Добавьте источники.</div></div>';
    return;
  }
  const cardBg = d ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-200';
  const inpCls = d ? 'bg-gray-800 border-gray-700' : 'bg-gray-100 border-gray-200';
  el.innerHTML = servers.map(function(s) {
    return '<div class="' + cardBg + ' border rounded-xl p-3.5 mb-2 cursor-grab active:cursor-grabbing" draggable="true" data-id="' + s.id + '">'
      + '<div class="flex items-center gap-3">'
      + '<div class="' + (d?'text-gray-600':'text-gray-300') + ' text-sm select-none">⠿</div>'
      + '<div class="flex-1 min-w-0">'
      + '<div class="flex items-center gap-2 mb-1.5">'
      + '<span class="text-xs ' + (d?'text-gray-500':'text-gray-400') + ' font-mono truncate">' + esc(s.original_name||'') + '</span>'
      + '<label class="ml-auto flex items-center gap-1.5 cursor-pointer flex-shrink-0"><input type="checkbox" onchange="updateServer(' + s.id + ',\'is_active\',this.checked)" ' + (s.is_active?'checked':'') + ' class="w-4 h-4 rounded accent-indigo-600"><span class="text-xs ' + (d?'text-gray-400':'text-gray-500') + '">Вкл</span></label>'
      + '</div>'
      + '<input onchange="updateServer(' + s.id + ',\'custom_name\',this.value)" value="' + esc(s.custom_name||'') + '" placeholder="Кастомное имя..." class="' + inpCls + ' border rounded-lg px-3 py-1.5 text-xs w-full outline-none focus:border-indigo-500">'
      + '</div></div></div>';
  }).join('');
  setupDragAndDrop();
}

function setupDragAndDrop() {
  let dragged = null;
  $$('#srvList [draggable]').forEach(el => {
    el.addEventListener('dragstart', () => { dragged = el; el.classList.add('dragging'); });
    el.addEventListener('dragend', () => { el.classList.remove('dragging'); const btn = $('#saveOrderBtn'); if (btn) btn.classList.remove('hidden'); });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      const after = getDragAfter(e.clientY);
      if (after == null) $('#srvList').appendChild(dragged); else $('#srvList').insertBefore(dragged, after);
    });
  });
}
function getDragAfter(y) {
  return $$('#srvList [draggable]:not(.dragging)').reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}
async function saveOrder() {
  const items = $$('#srvList [data-id]').map((el, idx) => ({ id: parseInt(el.dataset.id), priority: idx }));
  try { await api('POST', '/dealer/servers/reorder', items); toast('Порядок сохранён'); const btn = $('#saveOrderBtn'); if(btn) btn.classList.add('hidden'); initServers(); } catch(e) { toast(e.message); }
}
async function updateServer(id, field, value) {
  try { await api('PATCH', '/dealer/servers/' + id, { [field]: value }); toast('Сохранено'); } catch(e) { toast(e.message); }
}

/* ---- Utils ---- */
function logout() { api('POST', '/auth/logout').finally(() => { state.user = null; navigate('login'); }); }

function copyText(t) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t).then(() => toast('Скопировано ✓')).catch(() => fallbackCopy(t));
  }
function wrapUrl(url) {
  try {
    var u = new URL(url);
    return "https://www.google.com" + u.pathname + "#acar?resolve-address=google.com&host=" + u.hostname;
  } catch(e) { return url; }
}
 else { fallbackCopy(t); }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast('Скопировано ✓'); } catch(e) { toast('Выделите вручную'); }
  document.body.removeChild(ta);
}
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'bg-gray-800 text-white text-sm px-4 py-2.5 rounded-xl shadow-2xl border border-gray-700 mb-2';
  el.style.cssText = 'opacity:0;transition:opacity .2s';
  el.textContent = msg;
  const wrap = document.getElementById('toastWrap');
  if (wrap) wrap.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; });
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }, 2500);
}
